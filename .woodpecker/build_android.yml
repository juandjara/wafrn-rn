# Woodpecker CI workflow — Build Android App
# Runs on tags and manual triggers. Depends on the test workflow.
#
# For manual triggers, set the BUILD_TYPE variable via the Woodpecker UI
# to one of: dev, prod-foss, prod-google, prod-all
# If not set, defaults to "prod-foss".

when:
  - event: [tag, manual]

depends_on:
  - test

labels:
  platform: linux/amd64

steps:
  # ── Build ─────────────────────────────────────────────────────────────
  - name: build
    image: debian:trixie-slim
    environment:
      CI: 'true'
      UNSIGNED_APK: '1'
      NODE_OPTIONS: '--openssl-legacy-provider --max_old_space_size=4096'
      GRADLE_OPTS: '-Xmx2g -Dorg.gradle.jvmargs=-Xmx2g -Dorg.gradle.workers.max=2 -Dkotlin.daemon.jvm.options=-Xmx512m'
      BUILD_TYPE: ${CI_PIPELINE_DEPLOY_TARGET:-prod-foss}
    commands:
      # ── Node + Java (match F-Droid's Trixie build environment) ──
      - apt-get update -y
      - apt-get install -y curl unzip
      - curl -Lo node.tar.gz https://nodejs.org/dist/v24.15.0/node-v24.15.0-linux-x64.tar.gz
      - echo "44836872d9aec49f1e6b52a9a922872db9a2b02d235a616a5681b6a85fec8d89 node.tar.gz" | sha256sum -c -
      - tar xzf node.tar.gz --strip-components=1 -C /usr/local/
      - npm install -g corepack
      - echo "deb https://deb.debian.org/debian bookworm main" > /etc/apt/sources.list.d/bookworm.list
      - apt-get update
      - apt-get install -y -t bookworm openjdk-17-jdk-headless
      - update-java-alternatives -s java-1.17.0-openjdk-amd64

      # ── Android SDK ──
      - curl -4 --retry 3 --connect-timeout 30 -fsSL "https://dl.google.com/android/repository/commandlinetools-linux-13114758_latest.zip" -o tools.zip
      - mkdir -p /opt/android/cmdline-tools/latest /opt/gradle
      - unzip -q tools.zip
      - mv cmdline-tools /opt/android/cmdline-tools/latest/tools
      - export ANDROID_HOME=/opt/android
      - export GRADLE_USER_HOME=/opt/gradle
      - export ANDROID_BIN=$ANDROID_HOME/cmdline-tools/latest
      - export PATH="$ANDROID_BIN/emulator:$ANDROID_BIN/tools:$ANDROID_BIN/tools/bin:$ANDROID_BIN/platform-tools:$PATH"
      - echo "sdkmanager version:"
      - $ANDROID_BIN/tools/bin/sdkmanager --sdk_root=$ANDROID_HOME --version
      - yes | $ANDROID_BIN/tools/bin/sdkmanager --sdk_root=$ANDROID_HOME --licenses || true
      - $ANDROID_BIN/tools/bin/sdkmanager --sdk_root=$ANDROID_HOME "platform-tools"
      - export PATH=$PATH:$ANDROID_HOME/platform-tools/

      # ── pnpm ──
      - corepack enable
      - pnpm install --frozen-lockfile
      - pnpm rebuild lightningcss

      # ── Determine build type (fallback to prod-foss) ──
      - export BUILD_TYPE=$${BUILD_TYPE:-prod-foss}
      - echo "Build type is $BUILD_TYPE"

      # ── Dev build ──
      - |
        if [ "$BUILD_TYPE" = "dev" ]; then
          bash ./scripts/android_build.sh dev
          mkdir -p ./outputs/dev
          cp ./android/app/build/outputs/apk/debug/*.apk ./outputs/dev
        fi

      # ── Prod FOSS build ──
      - |
        if [ "$BUILD_TYPE" = "prod-all" ] || [ "$BUILD_TYPE" = "prod-foss" ]; then
          bash ./scripts/android_build.sh prod-foss
          mkdir -p ./outputs/prod-foss
          cp ./android/app/build/outputs/apk/release/*.apk ./outputs/prod-foss
        fi

      # ── Prod Google build ──
      - |
        if [ "$BUILD_TYPE" = "prod-all" ] || [ "$BUILD_TYPE" = "prod-google" ]; then
          bash ./scripts/android_build.sh prod-google
          mkdir -p ./outputs/prod-google
          cp ./android/app/build/outputs/bundle/release/*.aab ./outputs/prod-google
        fi

  # ── Sign (skipped for dev builds) ─────────────────────────────────────
  - name: sign
    image: eclipse-temurin:21-jdk-noble
    environment:
      BUILD_TYPE: ${CI_PIPELINE_DEPLOY_TARGET:-prod-foss}
      WAFRN_UPLOAD_STORE_FILE_BASE64:
        from_secret: wafrn_upload_store_file_base64
      WAFRN_UPLOAD_KEY_ALIAS:
        from_secret: wafrn_upload_key_alias
      WAFRN_UPLOAD_STORE_PASSWORD:
        from_secret: wafrn_upload_store_password
      WAFRN_UPLOAD_KEY_PASSWORD:
        from_secret: wafrn_upload_key_password
    commands:
      - export BUILD_TYPE=$${BUILD_TYPE:-prod-foss}
      # Skip signing for dev builds
      - |
        if [ "$BUILD_TYPE" = "dev" ]; then
          echo "Skipping signing for dev build"
          exit 0
        fi
      # Install build-tools for apksigner / zipalign
      - apt-get update -y && apt-get install -y curl unzip
      - mkdir -p /opt/android-sdk/cmdline-tools/latest
      - curl -4 --retry 3 --connect-timeout 30 -fsSL "https://dl.google.com/android/repository/commandlinetools-linux-13114758_latest.zip" -o /tmp/tools.zip
      - unzip -q /tmp/tools.zip -d /tmp/cmdline-tools
      - mv /tmp/cmdline-tools/cmdline-tools/* /opt/android-sdk/cmdline-tools/latest/
      - export ANDROID_HOME=/opt/android-sdk
      - yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME --licenses || true
      - $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME "build-tools;35.0.0"
      - export PATH=$PATH:$ANDROID_HOME/build-tools/35.0.0
      # Decode keystore
      - echo "$$WAFRN_UPLOAD_STORE_FILE_BASE64" | base64 -d > /tmp/keystore.jks
      # Sign all APKs and AABs in outputs/
      - |
        find ./outputs -name '*.apk' ! -name '*-signed*' | while read apk; do
          echo "Signing $apk"
          zipalign -v -p 4 "$apk" "$${apk%.apk}-aligned.apk"
          # v1 signing adds META-INF/MANIFEST.MF, .SF, .RSA files.
          # The content of those files is covered by the v2/v3 chunked-SHA256 digest.
          # reproducibility checks based on apksigcopier produces an unsigned APK without those files
          # so v3 verification fails after signature copy with no "wrong content" whatsoever
          # by turning off v1 signature we make sure those files are not created and the v2/v3 signature is thus not different without them
          apksigner sign \
            --v1-signing-enabled false \
            --v2-signing-enabled true \
            --v3-signing-enabled true \
            --ks /tmp/keystore.jks \
            --ks-key-alias "$$WAFRN_UPLOAD_KEY_ALIAS" \
            --ks-pass "pass:$$WAFRN_UPLOAD_STORE_PASSWORD" \
            --key-pass "pass:$$WAFRN_UPLOAD_KEY_PASSWORD" \
            --out "$${apk%.apk}-signed.apk" \
            "$${apk%.apk}-aligned.apk"
          rm -f "$${apk%.apk}-aligned.apk"
        done
      - |
        find ./outputs -name '*.aab' ! -name '*-signed*' | while read aab; do
          echo "Signing $aab"
          jarsigner \
            -keystore /tmp/keystore.jks \
            -storepass "$$WAFRN_UPLOAD_STORE_PASSWORD" \
            -keypass "$$WAFRN_UPLOAD_KEY_PASSWORD" \
            "$aab" \
            "$$WAFRN_UPLOAD_KEY_ALIAS"
          mv "$aab" "$${aab%.aab}-signed.aab"
        done
      # Clean up keystore
      - rm -f /tmp/keystore.jks

  # ── Upload artifacts to Codeberg ──────────────────────────────────────
  - name: upload-artifacts
    image: alpine
    environment:
      CODEBERG_TOKEN:
        from_secret: codeberg_token
    commands:
      - apk add --no-cache curl jq findutils
      - |
        REPO="wafrn/wafrn-rn"
        API="https://codeberg.org/api/v1/repos/$REPO"
        AUTH="Authorization: token $${CODEBERG_TOKEN}"
        BODY="Automated Build generated from WoodPecker CI on [Pipeline #$CI_PIPELINE_NUMBER](https://ci.djara.dev/repos/1/pipeline/$CI_PIPELINE_NUMBER)"

        if [ -n "$CI_COMMIT_TAG" ]; then
          # Creating a draft release to publish manually after review
          TAG="$CI_COMMIT_TAG"
          NAME="$TAG"

          RELEASE_ID=$(curl -4 -fsSL -H "$AUTH" "$API/releases/tags/$TAG" 2>/dev/null | jq -r '.id // empty')
          if [ -z "$RELEASE_ID" ]; then
            echo "Creating draft release for tag $TAG"
            RELEASE_ID=$(curl -4 -fsSL -X POST -H "$AUTH" \
              -H "Content-Type: application/json" \
              -d "{\"tag_name\": \"$TAG\", \"name\": \"$NAME\", \"draft\": true, \"body\": \"$BODY\"}" \
              "$API/releases" | jq -r '.id')
          fi
        else
          # Upload to a generic release name "dev-build", no git tag created
          TAG="dev-build"
          NAME="Development Build ($CI_COMMIT_BRANCH #$CI_PIPELINE_NUMBER)"

          RELEASE_ID=$(curl -4 -fsSL -H "$AUTH" "$API/releases" 2>/dev/null | jq -r ".[] | select(.tag_name == \"$TAG\") | .id // empty" | head -1)

          if [ -n "$RELEASE_ID" ]; then
            # Delete old assets
            echo "Cleaning old assets from dev-build release $RELEASE_ID"
            curl -4 -fsSL -H "$AUTH" "$API/releases/$RELEASE_ID/assets" | \
              jq -r '.[].id' | while read asset_id; do
                curl -4 -fsSL -X DELETE -H "$AUTH" "$API/releases/$RELEASE_ID/assets/$asset_id"
              done
            # Update name/body
            curl -4 -fsSL -X PATCH -H "$AUTH" \
              -H "Content-Type: application/json" \
              -d "{\"name\": \"$NAME\", \"body\": \"$BODY\"}" \
              "$API/releases/$RELEASE_ID" > /dev/null
          else
            echo "No dev-build release found. Create one manually on Codeberg first (without a git tag)."
            exit 1
          fi
        fi

        echo "Uploading to release $RELEASE_ID"

        # Upload all signed APKs/AABs, or debug APKs for dev builds
        find ./outputs -name '*-signed.apk' -o -name '*-signed.aab' -o -name '*-debug.apk' | while read f; do
          FILENAME=$(basename "$f" | sed s/release-unsigned-signed/foss/)
          echo "Uploading $FILENAME"
          curl -4 --retry 3 -fsSL -X POST \
            -H "$AUTH" \
            -F "attachment=@$f" \
            "$API/releases/$RELEASE_ID/assets?name=$FILENAME"
        done

        echo "Done! Assets uploaded to https://codeberg.org/$REPO/releases/tag/$TAG"
